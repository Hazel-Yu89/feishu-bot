name: Vercel 保活（消灭冷启动，飞书3秒校验必过）
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  ping-vercel:
    runs-on: ubuntu-latest
    steps:
      - name: 唤醒Vercel
        run: |
          # 替换成你的Vercel域名！
          curl -s https://feishu-bot-blush.vercel.app/ping
          echo "✅ Vercel已唤醒，冷启动已消灭"
